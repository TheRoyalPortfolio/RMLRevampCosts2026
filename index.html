<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Royal Portfolio | Malewane Revamp</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, remove, update }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA6PrNQXcdHp_4gKd6EyxEDt19W4Ilim0M",
  authDomain: "rmlrevamp2026.firebaseapp.com",
  databaseURL: "https://rmlrevamp2026-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "rmlrevamp2026",
  storageBucket: "rmlrevamp2026.firebasestorage.app",
  messagingSenderId: "221500385252",
  appId: "1:221500385252:web:56409a706cfacaa94bc9f1"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// Keep window references for global functions
window.db = db;
window.db_update = update;
window.db_remove = remove;
window.db_set = set;
window.db_ref = ref;

// SEED DATA (Used only if Firebase is completely empty)
const SEED_BUDGET = [
  {id:1,area:"DHW",supplier:"Energenic",type:"Quote",budget:637500},
  {id:2,area:"Pools (Heatpump + Filter...)",supplier:"Waterboys",type:"Quote",budget:591000},
  {id:3,area:"HVAC",supplier:"Parkes Refridgeration",type:"Assumption & Quote",budget:1625000},
  {id:4,area:"Roof FOH (Main Area, Dining)",supplier:"Tip Top Thatching",type:"Quote",budget:1215000},
  {id:12,area:"Construction",supplier:"Red Earth Construction",type:"Claims",budget:9850000},
  {id:25,area:"AC Electrical work",supplier:"Van Wyk & Prinsloo",type:"Assumption",budget:2500000},
  {id:33,area:"New Aluminium Doors / Windows",supplier:"Aluview",type:"Quotes",budget:3250000}
]; // (Truncated for snippet brevity - ensure you paste your full 51 items here)

const SEED_PAYMENTS = [
  {id:"p1", itemId:1, week:"2026-W02", amount:123300, supplier:"Energenic"},
  {id:"p2", itemId:2, week:"2026-W01", amount:70212.87, supplier:"Waterboys"},
  {id:"p3", itemId:12, week:"2025-W40", amount:136399, supplier:"Red Earth"}
];

const SEED_CASHFLOW = [
  {id:"c1", month:"2026-02", w1:0, w2:3000000, w3:0, w4:2750000},
  {id:"c2", month:"2026-03", w1:0, w2:3500000, w3:0, w4:3500000},
  {id:"c3", month:"2026-04", w1:0, w2:3500000, w3:0, w4:4000000}
];

window.budgetItems = [];
window.payments = [];
window.cashflow = [];

async function bootstrap() {
  const snapB = await get(ref(db, 'budgetItems'));
  if (!snapB.exists()) {
    let obj = {}; SEED_BUDGET.forEach(b => obj[b.id] = b); await set(ref(db, 'budgetItems'), obj);
    let pObj = {}; SEED_PAYMENTS.forEach(p => pObj[p.id] = p); await set(ref(db, 'payments'), pObj);
    let cObj = {}; SEED_CASHFLOW.forEach(c => cObj[c.id] = c); await set(ref(db, 'cashflow'), cObj);
  }

  onValue(ref(db, 'budgetItems'), s => { window.budgetItems = Object.values(s.val()||{}).sort((a,b)=>a.id-b.id); refreshUI(); });
  onValue(ref(db, 'payments'), s => { window.payments = Object.values(s.val()||{}).sort((a,b)=>a.week.localeCompare(b.week)); refreshUI(); });
  onValue(ref(db, 'cashflow'), s => { window.cashflow = Object.values(s.val()||{}).sort((a,b)=>a.month.localeCompare(b.month)); refreshUI(); });
}

bootstrap().then(() => { document.getElementById('loadingScreen').style.display = 'none'; });
</script>

<style>
/* TRP Branding Toolkit */
:root { --bg: #FDFBF7; --surface: #FFFFFF; --surface2: #F3EFE9; --border: #E5DED5; --text: #2C2A28; --text2: #5A5651; --text3: #8C867D; --accent: #B2915F; --nav-bg: #1A1A1A; --radius: 4px; --shadow: 0 4px 12px rgba(0,0,0,0.03); }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Lato', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 13px; line-height: 1.5; }

/* Loading & Login */
#loadingScreen, #loginScreen { position: fixed; inset: 0; z-index: 3000; background: var(--nav-bg); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
#loginScreen { display: none; z-index: 2000; } #loginScreen.show { display: flex; }
.spinner { width: 36px; height: 36px; border: 2px solid rgba(178,145,95,0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.login-card { background: var(--surface); width: 420px; border-radius: var(--radius); overflow: hidden; }
.login-header { padding: 40px; text-align: center; border-bottom: 1px solid var(--border); }
.login-lodge { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 600; }
.login-input { width: 100%; padding: 12px; border: 1px solid var(--border); margin: 20px 0; outline: none; }
.login-btn { width: 100%; padding: 14px; background: var(--text); color: white; border: none; cursor: pointer; text-transform: uppercase; font-weight: bold; }

/* Layout */
#shell { display: none; height: 100vh; overflow: hidden; flex-direction: column; } #shell.visible { display: flex; }
.topbar { background: var(--surface); height: 64px; display: flex; align-items: center; padding: 0 24px; border-bottom: 1px solid var(--border); }
.topbar-logo { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 600; }
.body-wrap { display: flex; flex: 1; overflow: hidden; }
.sidebar { width: 240px; background: var(--nav-bg); padding: 32px 0; }
.nav-item { padding: 12px 32px; cursor: pointer; color: rgba(255,255,255,.5); font-size: 13px; border-left: 3px solid transparent; transition: 0.2s; }
.nav-item:hover, .nav-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(178,145,95,.05); }

/* Main Content */
.main { flex: 1; overflow-y: auto; padding: 40px; }
.page { display: none; } .page.active { display: block; }
.page-title { font-family: 'Playfair Display', serif; font-size: 32px; margin-bottom: 32px; }
.kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 32px; }
.kpi { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; border-top: 3px solid var(--accent); }
.kpi-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--text3); margin-bottom: 12px; }
.kpi-value { font-family: 'JetBrains Mono', monospace; font-size: 24px; color: var(--text); }

/* Tables & Forms */
.section-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 32px; overflow: hidden; }
.filter-bar { padding: 16px 24px; background: var(--surface2); border-bottom: 1px solid var(--border); display: flex; gap: 16px; }
.filter-input { padding: 8px 12px; border: 1px solid var(--border); border-radius: 3px; width: 300px; }
table { width: 100%; border-collapse: collapse; }
th { padding: 14px 24px; text-align: left; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text3); border-bottom: 1px solid var(--border); cursor: pointer; }
th:hover { color: var(--accent); }
td { padding: 14px 24px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.r { text-align: right; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
.btn { padding: 6px 12px; border: none; border-radius: 3px; font-size: 11px; cursor: pointer; text-transform: uppercase; font-weight: 700; background: var(--surface2); color: var(--text); transition: 0.2s; }
.btn:hover { background: var(--border); }
.btn-primary { background: var(--accent); color: white; } .btn-primary:hover { background: var(--accent2); }

/* Modals */
.overlay { position: fixed; inset: 0; background: rgba(26,26,26,.8); z-index: 500; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
.overlay.open { display: flex; }
.modal { background: var(--surface); border-radius: var(--radius); width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
.modal-top { padding: 24px; border-bottom: 1px solid var(--border); font-family: 'Playfair Display', serif; font-size: 20px; }
.modal-mid { padding: 24px; display: flex; flex-direction: column; gap: 16px; }
.fg { display: flex; flex-direction: column; gap: 8px; }
.fl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text3); font-weight: 700; }
.fi { padding: 10px; border: 1px solid var(--border); border-radius: 3px; font-family: inherit; }
.modal-bot { padding: 20px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 12px; background: var(--surface2); }
</script>
</head>
<body>

<div id="loadingScreen"><div class="spinner"></div></div>

<div id="loginScreen">
  <div class="login-card">
    <div class="login-header"><div class="login-lodge">The Royal Portfolio</div></div>
    <div style="padding: 30px 40px;">
      <input type="password" class="login-input" id="loginPw" placeholder="Access Password">
      <button class="login-btn" onclick="doLogin()">Enter</button>
    </div>
  </div>
</div>

<div id="shell">
  <div class="topbar"><div class="topbar-logo">TRP | Malewane Revamp Manager</div></div>
  <div class="body-wrap">
    <div class="sidebar">
      <div class="nav-item active" onclick="showPage('budget')">Budget Overview</div>
      <div class="nav-item" onclick="showPage('payments')">Payment Ledger</div>
      <div class="nav-item" onclick="showPage('cashflow')">Cashflow Planning</div>
    </div>
    
    <div class="main">
      <div class="page active" id="page-budget">
        <div class="page-title">Master Budget</div>
        <div class="kpi-grid">
          <div class="kpi"><div class="kpi-label">Total Allocated</div><div class="kpi-value" id="kBudget">—</div></div>
          <div class="kpi"><div class="kpi-label">Total Spent</div><div class="kpi-value" id="kPaid">—</div></div>
          <div class="kpi"><div class="kpi-label">Remaining Variance</div><div class="kpi-value" id="kBalance">—</div></div>
        </div>
        <div class="section-card">
          <div class="filter-bar"><input type="text" class="filter-input" id="searchBudget" placeholder="Omni-search areas, suppliers..." oninput="refreshUI()"></div>
          <table>
            <thead><tr><th>ID</th><th>Area</th><th>Supplier</th><th class="r">Budget</th><th class="r">Paid</th><th class="r">Balance</th><th>Actions</th></tr></thead>
            <tbody id="tblBudget"></tbody>
          </table>
        </div>
      </div>

      <div class="page" id="page-payments">
        <div class="page-title">Chronological Ledger</div>
        <div class="section-card">
          <div class="filter-bar"><input type="text" class="filter-input" id="searchPmt" placeholder="Search invoices, suppliers..." oninput="refreshUI()"></div>
          <table>
            <thead><tr><th>Week</th><th>Budget Item ID</th><th>Supplier</th><th class="r">Amount (ex VAT)</th><th>Actions</th></tr></thead>
            <tbody id="tblPayments"></tbody>
          </table>
        </div>
      </div>

      <div class="page" id="page-cashflow">
        <div class="page-title">Weekly Cashflow Projection</div>
        <div class="section-card">
          <table>
            <thead><tr><th>Month</th><th class="r">Week 1</th><th class="r">Week 2</th><th class="r">Week 3</th><th class="r">Week 4</th><th class="r">Total</th><th>Actions</th></tr></thead>
            <tbody id="tblCashflow"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="editModal">
  <div class="modal">
    <div class="modal-top" id="emTitle">Edit Record</div>
    <div class="modal-mid" id="emForm"></div>
    <div class="modal-bot">
      <button class="btn" onclick="closeModal('editModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<script>
let currentEditType = null;
let currentEditId = null;

function doLogin() {
  if (document.getElementById('loginPw').value === 'Malewane2026!') {
    document.getElementById('loginScreen').classList.remove('show');
    document.getElementById('shell').classList.add('visible');
    window._appReady = true; refreshUI();
  }
}

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  event.currentTarget.classList.add('active');
}

function R(n) { return n ? 'R ' + Number(n).toLocaleString('en-ZA', {minimumFractionDigits:2, maximumFractionDigits:2}) : '—'; }
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// CORE RENDER LOGIC
window.refreshUI = function() {
  if (!window._appReady) return;

  // KPIs
  let tB = window.budgetItems.reduce((s,b)=>s+(Number(b.budget)||0), 0);
  let tP = window.payments.reduce((s,p)=>s+(Number(p.amount)||0), 0);
  document.getElementById('kBudget').textContent = R(tB);
  document.getElementById('kPaid').textContent = R(tP);
  document.getElementById('kBalance').textContent = R(tB - tP);

  // BUDGET TABLE
  let qB = document.getElementById('searchBudget').value.toLowerCase();
  let bHtml = '';
  window.budgetItems.filter(b => Object.values(b).join(' ').toLowerCase().includes(qB)).forEach(b => {
    let paid = window.payments.filter(p => Number(p.itemId) === Number(b.id)).reduce((s,p)=>s+Number(p.amount),0);
    bHtml += `<tr>
      <td>${b.id}</td><td><b>${b.area}</b></td><td>${b.supplier||'—'}</td>
      <td class="r">${R(b.budget)}</td><td class="r" style="color:var(--accent)">${R(paid)}</td><td class="r">${R(b.budget-paid)}</td>
      <td>
        <button class="btn" onclick="openEdit('budget', '${b.id}')">Edit</button>
        <button class="btn btn-primary" onclick="openEdit('new_payment', '${b.id}')">+ Pay</button>
      </td>
    </tr>`;
  });
  document.getElementById('tblBudget').innerHTML = bHtml;

  // PAYMENTS TABLE
  let qP = document.getElementById('searchPmt').value.toLowerCase();
  let pHtml = '';
  window.payments.filter(p => Object.values(p).join(' ').toLowerCase().includes(qP)).forEach(p => {
    pHtml += `<tr>
      <td><b>${p.week}</b></td><td>Item #${p.itemId}</td><td>${p.supplier||'—'}</td><td class="r">${R(p.amount)}</td>
      <td>
        <button class="btn" onclick="openEdit('payment', '${p.id}')">Edit</button>
        <button class="btn" style="color:red" onclick="deleteRecord('payments', '${p.id}')">Del</button>
      </td>
    </tr>`;
  });
  document.getElementById('tblPayments').innerHTML = pHtml;

  // CASHFLOW TABLE
  let cHtml = '';
  window.cashflow.forEach(c => {
    let tot = Number(c.w1||0)+Number(c.w2||0)+Number(c.w3||0)+Number(c.w4||0);
    cHtml += `<tr>
      <td><b>${c.month}</b></td><td class="r">${R(c.w1)}</td><td class="r">${R(c.w2)}</td><td class="r">${R(c.w3)}</td><td class="r">${R(c.w4)}</td>
      <td class="r" style="color:var(--accent)"><b>${R(tot)}</b></td>
      <td><button class="btn" onclick="openEdit('cashflow', '${c.id}')">Edit</button></td>
    </tr>`;
  });
  document.getElementById('tblCashflow').innerHTML = cHtml;
};

// DYNAMIC EDIT FORM GENERATOR
window.openEdit = function(type, id) {
  currentEditType = type; currentEditId = id;
  let form = document.getElementById('emForm'); form.innerHTML = '';
  let data = {};

  if (type === 'budget') {
    document.getElementById('emTitle').textContent = "Edit Budget Line";
    data = window.budgetItems.find(b => String(b.id) === String(id));
    form.innerHTML = `
      <div class="fg"><label class="fl">Area</label><input class="fi" id="ed_area" value="${data.area}"></div>
      <div class="fg"><label class="fl">Supplier</label><input class="fi" id="ed_supplier" value="${data.supplier||''}"></div>
      <div class="fg"><label class="fl">Budget Total (ex VAT)</label><input type="number" class="fi" id="ed_budget" value="${data.budget}"></div>
    `;
  } 
  else if (type === 'payment' || type === 'new_payment') {
    document.getElementById('emTitle').textContent = type === 'payment' ? "Edit Payment" : "Log New Payment";
    if (type === 'payment') data = window.payments.find(p => String(p.id) === String(id));
    else data = { itemId: id, week: '', amount: 0, supplier: '' };
    
    form.innerHTML = `
      <div class="fg"><label class="fl">Week (YYYY-Www)</label><input type="week" class="fi" id="ed_week" value="${data.week}"></div>
      <div class="fg"><label class="fl">Budget Item ID</label><input type="number" class="fi" id="ed_itemId" value="${data.itemId}"></div>
      <div class="fg"><label class="fl">Supplier / Ref</label><input class="fi" id="ed_supplier" value="${data.supplier||''}"></div>
      <div class="fg"><label class="fl">Amount (ex VAT)</label><input type="number" class="fi" id="ed_amount" value="${data.amount}"></div>
    `;
  }
  else if (type === 'cashflow') {
    document.getElementById('emTitle').textContent = "Edit Cashflow Month";
    data = window.cashflow.find(c => String(c.id) === String(id));
    form.innerHTML = `
      <div class="fg"><label class="fl">Month (YYYY-MM)</label><input type="month" class="fi" id="ed_month" value="${data.month}"></div>
      <div class="fg"><label class="fl">Week 1 Allocation</label><input type="number" class="fi" id="ed_w1" value="${data.w1}"></div>
      <div class="fg"><label class="fl">Week 2 Allocation</label><input type="number" class="fi" id="ed_w2" value="${data.w2}"></div>
      <div class="fg"><label class="fl">Week 3 Allocation</label><input type="number" class="fi" id="ed_w3" value="${data.w3}"></div>
      <div class="fg"><label class="fl">Week 4 Allocation</label><input type="number" class="fi" id="ed_w4" value="${data.w4}"></div>
    `;
  }
  openModal('editModal');
};

window.saveEdit = function() {
  if (currentEditType === 'budget') {
    let updates = {
      area: document.getElementById('ed_area').value,
      supplier: document.getElementById('ed_supplier').value,
      budget: Number(document.getElementById('ed_budget').value)
    };
    window.db_update(window.db_ref(window.db, `budgetItems/${currentEditId}`), updates);
  } 
  else if (currentEditType === 'payment' || currentEditType === 'new_payment') {
    let pid = currentEditType === 'payment' ? currentEditId : 'pay_' + Date.now();
    let updates = {
      id: pid,
      week: document.getElementById('ed_week').value,
      itemId: Number(document.getElementById('ed_itemId').value),
      supplier: document.getElementById('ed_supplier').value,
      amount: Number(document.getElementById('ed_amount').value)
    };
    window.db_set(window.db_ref(window.db, `payments/${pid}`), updates);
  }
  else if (currentEditType === 'cashflow') {
    let updates = {
      month: document.getElementById('ed_month').value,
      w1: Number(document.getElementById('ed_w1').value),
      w2: Number(document.getElementById('ed_w2').value),
      w3: Number(document.getElementById('ed_w3').value),
      w4: Number(document.getElementById('ed_w4').value)
    };
    window.db_update(window.db_ref(window.db, `cashflow/${currentEditId}`), updates);
  }
  closeModal('editModal');
};

window.deleteRecord = function(node, id) {
  if (confirm("Are you sure you want to delete this record? This affects overall totals.")) {
    window.db_remove(window.db_ref(window.db, `${node}/${id}`));
  }
};
</script>
</body>
</html>
